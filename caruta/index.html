<!DOCTYPE html>
<html lang="fil">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filipino Voice Scroller</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; background-color: #f0f2f5; color: #333; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        textarea { width: 100%; height: 120px; margin-bottom: 15px; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 1rem; resize: vertical; }
        
        /* The Display Area */
        #display-area { 
            font-size: 1.4rem; 
            margin-top: 20px; 
            height: 400px; 
            overflow-y: auto; 
            border: 1px solid #eee; 
            padding: 20px; 
            border-radius: 8px;
            background: #fafafa;
            scroll-behavior: smooth;
        }

        .sentence { display: inline; transition: all 0.4s ease; padding: 2px 4px; border-radius: 4px; color: #888; }
        
        /* The Highlight Style */
        .highlight { 
            background-color: #4caf50; 
            color: white !important; 
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .controls { display: flex; gap: 15px; align-items: center; margin-bottom: 20px; }
        button { padding: 12px 24px; cursor: pointer; border: none; border-radius: 6px; font-weight: bold; transition: opacity 0.2s; }
        #start-btn { background: #28a745; color: white; }
        #stop-btn { background: #dc3545; color: white; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        #status { font-size: 0.9rem; color: #666; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Filipino Speech Scroller</h2>
    <textarea id="input-text">I-paste ang iyong talata dito. Kapag nagsalita ka, kusang gagalaw ang screen. Halimbawa, subukan mong basahin ang pangungusap na ito. Ang bilis ng pag-scroll ay nakadepende sa iyong boses.</textarea>
    
    <div class="controls">
        <button id="start-btn">Magsimula (Start)</button>
        <button id="stop-btn" disabled>Tigil (Stop)</button>
        <span id="status">Handa na...</span>
    </div>

    <div id="display-area"></div>
</div>

<script>
    const startBtn = document.getElementById('start-btn');
    const stopBtn = document.getElementById('stop-btn');
    const textArea = document.getElementById('input-text');
    const displayArea = document.getElementById('display-area');
    const status = document.getElementById('status');

    let recognition;
    let sentences = [];
    let isManuallyStopped = false;

    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        
        recognition.lang = 'fil-PH'; 
        recognition.interimResults = true;
        recognition.continuous = true;

        recognition.onstart = () => {
            status.innerText = "🔴 Nakikinig...";
            isManuallyStopped = false;
        };

        recognition.onresult = (event) => {
            let transcript = "";
            for (let i = 0; i < event.results.length; i++) {
                transcript += event.results[i][0].transcript;
            }
            matchAndScroll(transcript.toLowerCase());
        };

        recognition.onend = () => {
            if (!isManuallyStopped) {
                recognition.start(); // Auto-restart if it drops
            } else {
                status.innerText = "⚪ Huminto.";
            }
        };
    }

    function prepareDisplay() {
        const rawText = textArea.value;
        // Split text into sentences but keep punctuation
        sentences = rawText.match(/[^.!?]+[.!?]?/g) || [rawText];
        
        displayArea.innerHTML = sentences.map((s, i) => 
            `<span id="s-${i}" class="sentence">${s}</span>`
        ).join(' ');
    }

    function matchAndScroll(spokenText) {
        let lastMatchedIndex = -1;

        sentences.forEach((original, i) => {
            const cleanTarget = original.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"").trim();
            const element = document.getElementById(`s-${i}`);

            // If spoken text contains this sentence
            if (spokenText.includes(cleanTarget) && cleanTarget.length > 2) {
                if (!element.classList.contains('highlight')) {
                    element.classList.add('highlight');
                    lastMatchedIndex = i; // Track the newest match
                }
            }
        });

        // Scroll to the most recent match
        if (lastMatchedIndex !== -1) {
            const latestElement = document.getElementById(`s-${lastMatchedIndex}`);
            latestElement.scrollIntoView({
                behavior: 'smooth',
                block: 'center' // Keep the active text in the middle of the box
            });
        }
    }

    startBtn.onclick = () => {
        prepareDisplay();
        startBtn.disabled = true;
        stopBtn.disabled = false;
        recognition.start();
    };

    stopBtn.onclick = () => {
        isManuallyStopped = true;
        startBtn.disabled = false;
        stopBtn.disabled = true;
        recognition.stop();
    };
</script>

</body>
</html>
