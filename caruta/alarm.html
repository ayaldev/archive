<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Presenter Pro Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f0f0f;
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background-color 0.3s ease;
        }
        .alert-active { background-color: #660000 !important; }
        
        #header {
            width: 100%;
            padding: 20px;
            text-align: center;
            background: rgba(255,255,255,0.05);
            border-bottom: 1px solid #333;
        }

        .main-container {
            width: 90%;
            max-width: 1000px;
            padding: 20px;
            text-align: center;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #333;
        }

        .percent { font-size: 4rem; font-weight: bold; color: #00ff00; }
        .alert-active .percent { color: #ff4444; }

        .chart-container {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #333;
            height: 350px;
        }

        button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            margin: 20px 0;
        }
        button:hover { background: #1d4ed8; }
    </style>
</head>
<body>

    <div id="header">
        <h2>WEB PRESENTER CACHE MONITOR</h2>
        <div id="conn-status">Waiting for data...</div>
    </div>

    <div class="main-container">
        <div class="stats-grid">
            <div class="stat-card">
                <div>CURRENT CACHE</div>
                <div class="percent" id="cache-display">0%</div>
            </div>
            <div class="stat-card">
                <div>SYSTEM ACTION</div>
                <button id="start-btn">ENABLE ALARM AUDIO</button>
                <div id="alarm-status" style="color: #888;">Audio: Muted</div>
            </div>
        </div>

        <div class="chart-container">
            <canvas id="cacheChart"></canvas>
        </div>
    </div>

    <audio id="alert-sound" loop>
        <source src="https://ayaldev.github.io/archive/caruta/alarm.ogg" type="audio/ogg">
    </audio>

    <script>
        const API_URL = 'http://192.168.50.250/control/api/v1/livestreams/0';
        const cacheDisplay = document.getElementById('cache-display');
        const connStatus = document.getElementById('conn-status');
        const alertSound = document.getElementById('alert-sound');
        const startBtn = document.getElementById('start-btn');
        const alarmStatus = document.getElementById('alarm-status');

        let audioEnabled = false;
        const MAX_DATA_POINTS = 60; // 1 minute of history

        // Initialize Chart.js
        const ctx = document.getElementById('cacheChart').getContext('2d');
        const cacheChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array(MAX_DATA_POINTS).fill(''),
                datasets: [{
                    label: 'Cache %',
                    data: Array(MAX_DATA_POINTS).fill(0),
                    borderColor: '#00ff00',
                    backgroundColor: 'rgba(0, 255, 0, 0.1)',
                    fill: true,
                    tension: 0.4,
                    pointRadius: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { min: 0, max: 100, grid: { color: '#333' } },
                    x: { display: false }
                },
                plugins: {
                    legend: { display: false }
                },
                animation: { duration: 0 } // Faster updates
            }
        });

        startBtn.addEventListener('click', () => {
            audioEnabled = true;
            startBtn.style.display = 'none';
            alarmStatus.innerText = "Audio: ARMED";
            alarmStatus.style.color = "#00ff00";
            alertSound.play().then(() => alertSound.pause());
        });

        async function updateData() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                const cacheValue = data.cache || 0;

                // Update Text
                cacheDisplay.innerText = cacheValue + '%';
                connStatus.innerText = "Connected: " + data.status;

                // Update Chart
                cacheChart.data.datasets[0].data.push(cacheValue);
                cacheChart.data.datasets[0].data.shift();
                
                // Change chart color based on threshold
                if (cacheValue > 4) {
                    document.body.classList.add('alert-active');
                    cacheChart.data.datasets[0].borderColor = '#ff0000';
                    cacheChart.data.datasets[0].backgroundColor = 'rgba(255, 0, 0, 0.3)';
                    if (audioEnabled) alertSound.play();
                } else {
                    document.body.classList.remove('alert-active');
                    cacheChart.data.datasets[0].borderColor = '#00ff00';
                    cacheChart.data.datasets[0].backgroundColor = 'rgba(0, 255, 0, 0.1)';
                    alertSound.pause();
                }

                cacheChart.update();

            } catch (error) {
                connStatus.innerText = "OFFLINE: Check IP or CORS";
                console.error('Fetch error:', error);
            }
        }

        setInterval(updateData, 1000);
    </script>
</body>
</html>
